validate_accounts_task:
description: >
Retrieve active Instagram accounts from the Account Manager.
Verify account status is active and eligible for publishing.
Exclude inactive or invalid accounts.

expected_output: >
List of validated Instagram account IDs ready for publishing.

agent: account_manager

validate_media_task:
description: >
Validate uploaded media file: {media_file}

```
Verify supported image and video formats,
dimensions, duration limits and file sizes.
```

expected_output: >
Media validation report containing validation status.

agent: media_validator

validate_caption_task:
description: >
Validate caption: {caption}

```
Validate hashtags: {hashtags}

Caption and hashtags are optional.
If not provided, continue processing.
```

expected_output: >
Validated caption and hashtag package.

agent: caption_validator

publish_media_task:
description: >
Publish media file: {media_file}

```
Caption: {caption}

Hashtags: {hashtags}

Schedule Time: {schedule_time}

Publish validated media to all active Instagram accounts.

If schedule_time is provided, schedule the post.
Otherwise publish immediately.
```

expected_output: >
Publishing status for each Instagram account.

agent: publisher

monitor_jobs_task:
description: >
Monitor publishing jobs.
Detect failed jobs and capture failure reasons.

expected_output: >
Publishing monitoring report with success and failure counts.

agent: monitor

generate_report_task:
description: >
Generate a final summary report showing:
- Total accounts processed
- Successful publications
- Failed publications
- Failure reasons
- Publishing summary

expected_output: >
Administrative publishing summary report.

agent: report_generator
